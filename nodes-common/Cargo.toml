[package]
name = "taceo-nodes-common"
version = "0.4.2"
edition.workspace = true
rust-version.workspace = true
description = "Collection of common functions used by nodes in our MPC networks"
readme = "./README.md"
repository.workspace = true
license.workspace = true
publish = true

[dependencies]
alloy = { workspace = true, features = ["full", "json-rpc"], optional = true }
aws-config = { workspace = true, features = ["behavior-version-latest"], optional = true }
aws-sdk-secretsmanager = { workspace = true, optional = true }
axum = { workspace = true, optional = true }
backon = { workspace = true, features = ["std", "tokio-sleep"], optional = true }
git-version = { workspace = true }
humantime-serde = { workspace = true, optional = true }
secrecy = { workspace = true, features = ["serde"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
sqlx = { workspace = true, features = [
  "postgres",
  "runtime-tokio",
  "tls-rustls-aws-lc-rs"
], optional = true }
tokio = { workspace = true, features = ["macros", "rt", "signal"] }
tokio-util = { workspace = true }
tower = { workspace = true, optional = true }
tower-http = { workspace = true, features = ["set-header"], optional = true }
tracing.workspace = true

[features]
default = ["alloy", "api", "aws", "postgres", "serde"]
alloy = [
  "dep:alloy",
  "dep:backon",
  "dep:humantime-serde",
  "dep:serde",
  "dep:tower",
]
api = ["dep:axum", "dep:tower-http"]
aws = ["dep:aws-config", "dep:aws-sdk-secretsmanager"]
postgres = [
  "dep:backon",
  "dep:humantime-serde",
  "dep:secrecy",
  "dep:serde",
  "dep:sqlx"
]
serde = ["dep:serde"]
